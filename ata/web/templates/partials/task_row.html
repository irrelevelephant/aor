{{define "task_row.html"}}
<div class="task-row" data-id="{{.ID}}" id="task-{{.ID}}">
    <span class="id-badge">{{.ID}}</span>
    <a href="{{taskURL .IsEpic .ID}}" class="task-link">{{.Title}}</a>
    {{if .IsEpic}}<span class="badge epic-badge">epic</span>{{end}}
    {{if .EpicID}}<span class="badge epic-ref">{{.EpicID}}</span>{{end}}
    {{template "task_claim_inline.html" .}}
</div>
{{end}}
