{{define "task_row.html"}}
<div class="task-row" data-id="{{.ID}}" id="task-{{.ID}}">
    <span class="id-badge">{{.ID}}</span>
    <a href="{{if .IsEpic}}/epic/{{.ID}}{{else}}/task/{{.ID}}{{end}}" class="task-link">{{.Title}}</a>
    {{if .IsEpic}}<span class="badge epic-badge">epic</span>{{end}}
    {{if .EpicID}}<span class="badge epic-ref">{{.EpicID}}</span>{{end}}
    {{if eq .Status "in_progress"}}{{if .ClaimedPID}}<span class="badge agent-badge">pid:{{.ClaimedPID}}</span>{{end}}{{if .Worktree}}<span class="badge worktree-badge" title="{{.Worktree}}">wt</span>{{end}}{{end}}
</div>
{{end}}
