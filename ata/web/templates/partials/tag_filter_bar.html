{{define "tag_filter_bar.html"}}
<div class="filter-toolbar">
    {{if .AllTags}}
    <div class="filter-dropdown">
        <button type="button" class="btn btn-sm filter-dropdown-toggle" onclick="toggleFilterDropdown(this)">
            Filter{{if .HasFilters}} <span class="filter-active-count">{{len .IncludeSet}}</span>{{end}} ▾
        </button>
        <div class="filter-dropdown-menu">
            {{range .AllTags}}
            <label class="filter-dropdown-item" style="--tag-color:{{tagColor .}};--tag-bg:{{tagBgColor .}}">
                <input type="checkbox" data-tag="{{.}}"{{if index $.IncludeSet .}} checked{{end}} onchange="includeTagFilter(this.dataset.tag)">
                <span class="badge tag-badge" style="color:{{tagColor .}};background:{{tagBgColor .}}">{{.}}</span>
            </label>
            {{end}}
            {{if .HasFilters}}
            <div class="filter-dropdown-footer">
                <button type="button" class="btn btn-sm" onclick="clearTagFilters()">Clear filters</button>
            </div>
            {{end}}
        </div>
    </div>
    {{end}}
    <input type="text" class="filter-search input-sm" placeholder="Search tasks..." oninput="filterTasksBySearch(this.value)">
</div>
{{end}}
