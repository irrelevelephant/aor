{{template "layout" .}}
{{define "content"}}
<h1>Workspaces</h1>
{{if .Workspaces}}
<div class="workspace-list">
    {{range .Workspaces}}
    <a href="{{workspaceURL .Path .Name}}" class="workspace-card">
        <div class="workspace-info">
            {{if .Name}}<span class="workspace-name">{{.Name}}</span>{{end}}
            <span class="workspace-path">{{.Path}}</span>
        </div>
        <span class="badge">{{.Count}}</span>
    </a>
    {{end}}
</div>
{{else}}
<p class="empty">No workspaces with active tasks.</p>
{{end}}
{{end}}
