{{define "topnav-extras"}}
<div class="terminal-chip">
    <div class="terminal-chip-segment terminal-chip-machine">
        <button class="terminal-chip-btn" id="terminal-picker-machine" type="button" aria-haspopup="true" aria-expanded="false">
            <span class="terminal-stripe" style="background: {{.Machine.Color}}"></span>
            <span class="terminal-machine-sizer">
                <span class="terminal-machine">{{.Machine.Display}}</span>
                {{range .Machines}}<span class="terminal-machine-ghost" aria-hidden="true">{{.Display}}</span>{{end}}
            </span>
            <span class="terminal-chip-caret" aria-hidden="true">▾</span>
        </button>
        <div class="terminal-popover terminal-popover-machine" id="terminal-picker-machine-popover" hidden role="menu" aria-labelledby="terminal-picker-machine"></div>
    </div>
    <span class="terminal-chip-divider" aria-hidden="true"></span>
    <div class="terminal-chip-segment terminal-chip-window">
        <button class="terminal-chip-btn" id="terminal-picker-window" type="button" aria-haspopup="true" aria-expanded="false">
            <span class="terminal-window-name">{{.Window.Name}}</span>
            <span class="terminal-chip-caret" aria-hidden="true">▾</span>
        </button>
        <div class="terminal-popover terminal-popover-window" id="terminal-picker-window-popover" hidden role="menu" aria-labelledby="terminal-picker-window"></div>
    </div>
</div>
{{end}}
{{define "content"}}
<div class="terminal-page">
    <div id="terminal" class="terminal-host">
        <div class="copy-cursor" id="copy-cursor" hidden></div>
    </div>
    <div class="helperbar" id="helperbar">
        <button class="hb-btn hb-winnav" id="hb-winnav-prev" data-action="winnav:prev" aria-label="Previous window">◀</button>
        <button class="hb-btn hb-winnav" id="hb-winnav-next" data-action="winnav:next" aria-label="Next window">▶</button>
        <!-- Default-mode buttons (hidden when [data-mode="copy"]) -->
        <button class="hb-btn hb-default hb-copy" data-action="copy" aria-label="Copy mode">📋</button>
        <button class="hb-btn hb-default" data-action="key:esc">Esc</button>
        <button class="hb-btn hb-default" data-action="key:tab">Tab</button>
        <button class="hb-btn hb-default" data-action="key:pgup">PgUp</button>
        <button class="hb-btn hb-default" data-action="key:up">↑</button>
        <button class="hb-btn hb-default" data-action="key:pgdn">PgDn</button>
        <button class="hb-btn hb-default" data-action="cmdmenu" aria-label="Quick commands">⚡</button>
        <button class="hb-btn hb-default" data-action="paste" aria-label="Paste">📥</button>
        <button class="hb-btn hb-default hb-mod" data-action="mod:ctrl">Ctrl</button>
        <button class="hb-btn hb-default hb-mod" data-action="mod:alt">Alt</button>
        <button class="hb-btn hb-default" data-action="key:left">←</button>
        <button class="hb-btn hb-default" data-action="key:down">↓</button>
        <button class="hb-btn hb-default" data-action="key:right">→</button>
        <button class="hb-btn hb-default hb-bigicon" data-action="compose" aria-label="Compose prompt">📝</button>
        <!-- Copy-mode buttons (hidden unless [data-mode="copy"]) -->
        <button class="hb-btn hb-copymode hb-copy-done" data-action="copyfn:done" aria-label="Done">Done</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:word-left" aria-label="Previous word">⇇</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:cursor-up">↑</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:word-right" aria-label="Next word">⇉</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:history-top" aria-label="Top of history">⤒</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:page-up">PgUp</button>
        <button class="hb-btn hb-copymode hb-copy-mark" data-action="copyfn:mark" aria-label="Mark/Unmark">Mark</button>
        <button class="hb-btn hb-copymode hb-copy-cancel" data-action="copyfn:cancel" aria-label="Cancel">✕</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:cursor-left">←</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:cursor-down">↓</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:cursor-right">→</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:history-bottom" aria-label="Bottom of history">⤓</button>
        <button class="hb-btn hb-copymode" data-action="copyfn:page-down">PgDn</button>
        <button class="hb-btn hb-copymode hb-copy-yank" data-action="copyfn:yank" aria-label="Yank">Yank</button>
        <!-- Command-menu buttons (shown when [data-mode="cmd"]); rendered in two rows via the flex line-break span -->
        <button class="hb-btn hb-cmdmode hb-cmd-back" data-action="cmd:dismiss" aria-label="Close commands">✕</button>
        <button class="hb-btn hb-cmdmode" data-action="cmd:new">New</button>
        <button class="hb-btn hb-cmdmode" data-action="cmd:rename">Rename</button>
        <button class="hb-btn hb-cmdmode hb-cmd-destructive" data-action="cmd:close">Close</button>
        <span class="hb-cmd-rowbreak" aria-hidden="true"></span>
        <button class="hb-btn hb-cmdmode" data-action="cmd:swap-prev" aria-label="Move window left">◀</button>
        <button class="hb-btn hb-cmdmode" data-action="cmd:swap-next" aria-label="Move window right">▶</button>
        <button class="hb-btn hb-cmdmode" data-action="cmd:renumber" aria-label="Renumber windows">♻️</button>
    </div>
    <div class="paste-catcher" id="paste-catcher" hidden>
        <div class="paste-catcher-box">
            <div class="paste-catcher-hint">Long-press below, then tap <strong>Paste</strong>.</div>
            <div class="paste-catcher-target" id="paste-catcher-target"
                 contenteditable="true" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"></div>
            <button class="hb-btn paste-catcher-cancel" id="paste-catcher-cancel">Cancel</button>
        </div>
    </div>
    <div class="copy-toast" id="copy-toast" hidden>Copied — tap to copy to clipboard</div>
    <div class="confirm-modal" id="close-confirm-modal" hidden>
        <div class="confirm-modal-card">
            <div class="confirm-modal-title" id="close-confirm-title">Close window?</div>
            <div class="confirm-modal-actions">
                <button class="hb-btn confirm-cancel" id="close-confirm-cancel">Cancel</button>
                <button class="hb-btn confirm-destructive" id="close-confirm-yes">Close</button>
            </div>
        </div>
    </div>
    <div class="prompt-modal" id="prompt-modal" hidden>
        <div class="prompt-modal-header">
            <button class="hb-btn prompt-modal-close" id="prompt-modal-close" aria-label="Close">×</button>
        </div>
        <textarea class="prompt-modal-textarea" id="prompt-modal-textarea"
                  autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
                  placeholder="Compose…"></textarea>
        <button class="prompt-modal-submit" id="prompt-modal-submit" aria-label="Send" disabled>⏎</button>
    </div>
    <div class="ios-install-banner" id="ios-install-banner" hidden>
        <span>For full functionality, tap <strong>Share</strong> → <strong>Add to Home Screen</strong>.</span>
        <button class="hb-btn" id="ios-install-dismiss" aria-label="Dismiss">×</button>
    </div>
</div>
<script>
window.atxView = {
    machine: {{.Machine.Name | json}},
    window: {{.Window.Index}},
    machines: {{.Machines | json}}
};
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="/atx/static/terminal.js"></script>
{{end}}
