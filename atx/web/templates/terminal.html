{{define "content"}}
<div class="terminal-page">
    <div class="terminal-header">
        <button class="terminal-nav" id="terminal-nav-prev" type="button" aria-label="Previous window">◀</button>
        <div class="terminal-chip">
            <div class="terminal-chip-segment terminal-chip-machine">
                <button class="terminal-chip-btn" id="terminal-picker-machine" type="button" aria-haspopup="true" aria-expanded="false">
                    <span class="terminal-stripe" style="background: {{.Machine.Color}}"></span>
                    <span class="terminal-machine">{{.Machine.Display}}</span>
                    <span class="terminal-chip-caret" aria-hidden="true">▾</span>
                </button>
                <div class="terminal-popover terminal-popover-machine" id="terminal-picker-machine-popover" hidden role="menu" aria-labelledby="terminal-picker-machine"></div>
            </div>
            <span class="terminal-chip-divider" aria-hidden="true"></span>
            <div class="terminal-chip-segment terminal-chip-window">
                <button class="terminal-chip-btn" id="terminal-picker-window" type="button" aria-haspopup="true" aria-expanded="false">
                    <span class="terminal-window-name">{{.Window.Name}}</span>
                    <span class="terminal-chip-caret" aria-hidden="true">▾</span>
                </button>
                <div class="terminal-popover terminal-popover-window" id="terminal-picker-window-popover" hidden role="menu" aria-labelledby="terminal-picker-window"></div>
            </div>
        </div>
        <button class="terminal-nav" id="terminal-nav-next" type="button" aria-label="Next window">▶</button>
    </div>
    <div id="terminal" class="terminal-host"></div>
    <div class="helperbar" id="helperbar">
        <button class="hb-btn" data-action="key:esc">Esc</button>
        <button class="hb-btn" data-action="key:c-o">C-o</button>
        <button class="hb-btn hb-bigicon" data-action="key:enter">⏎</button>
        <button class="hb-btn" data-action="key:pgup">PgUp</button>
        <button class="hb-btn" data-action="key:up">↑</button>
        <button class="hb-btn" data-action="key:pgdn">PgDn</button>
        <button class="hb-btn hb-compose" data-action="compose" aria-label="Compose prompt">📝</button>
        <button class="hb-btn" data-action="key:tab">Tab</button>
        <button class="hb-btn hb-mod" data-action="mod:ctrl">Ctrl</button>
        <button class="hb-btn hb-mod" data-action="mod:alt">Alt</button>
        <button class="hb-btn" data-action="key:left">←</button>
        <button class="hb-btn" data-action="key:down">↓</button>
        <button class="hb-btn" data-action="key:right">→</button>
    </div>
    <div class="prompt-modal" id="prompt-modal" hidden>
        <div class="prompt-modal-header">
            <button class="hb-btn prompt-modal-close" id="prompt-modal-close" aria-label="Close">×</button>
        </div>
        <textarea class="prompt-modal-textarea" id="prompt-modal-textarea"
                  autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false"
                  placeholder="Compose…"></textarea>
        <button class="prompt-modal-submit" id="prompt-modal-submit" aria-label="Send" disabled>⏎</button>
    </div>
    <div class="ios-install-banner" id="ios-install-banner" hidden>
        <span>For full functionality, tap <strong>Share</strong> → <strong>Add to Home Screen</strong>.</span>
        <button class="hb-btn" id="ios-install-dismiss" aria-label="Dismiss">×</button>
    </div>
</div>
<script>
window.atxView = {
    machine: {{.Machine.Name | json}},
    window: {{.Window.Index}},
    machines: {{.Machines | json}}
};
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="/atx/static/terminal.js"></script>
{{end}}
