{{define "content"}}
<div class="terminal-page">
    <div class="terminal-header">
        <a href="/atx/#m-{{.Machine.Name}}" class="terminal-back">←</a>
        <span class="terminal-stripe" style="background: {{.Machine.Color}}"></span>
        <span class="terminal-machine">{{.Machine.Display}}</span>
        <span class="terminal-sep">·</span>
        <span class="terminal-window-index">{{.Window.Index}}</span>
        <span class="terminal-window-name">{{.Window.Name}}</span>
    </div>
    <div id="terminal" class="terminal-host"></div>
    {{if .IsMobile}}
    <div class="helperbar" id="helperbar">
        <div class="helperbar-row">
            <button class="hb-btn" data-keyname="esc">Esc</button>
            <button class="hb-btn" data-keyname="c-o">C-o</button>
            <button class="hb-btn" data-keyname="enter">↵</button>
            <button class="hb-btn" data-keyname="home">Home</button>
            <button class="hb-btn" data-keyname="up">↑</button>
            <button class="hb-btn" data-keyname="end">End</button>
            <button class="hb-btn" data-keyname="pgup">PgUp</button>
        </div>
        <div class="helperbar-row">
            <button class="hb-btn" data-keyname="tab">Tab</button>
            <button class="hb-btn hb-mod" data-mod="ctrl">Ctrl</button>
            <button class="hb-btn hb-mod" data-mod="alt">Alt</button>
            <button class="hb-btn" data-keyname="left">←</button>
            <button class="hb-btn" data-keyname="down">↓</button>
            <button class="hb-btn" data-keyname="right">→</button>
            <button class="hb-btn" data-keyname="pgdn">PgDn</button>
        </div>
    </div>
    {{end}}
    <div class="ios-install-banner" id="ios-install-banner" hidden>
        <span>For full functionality, tap <strong>Share</strong> → <strong>Add to Home Screen</strong>.</span>
        <button class="hb-btn" id="ios-install-dismiss" aria-label="Dismiss">×</button>
    </div>
</div>
<script>
window.atxView = {
    machine: {{.Machine.Name | json}},
    window: {{.Window.Index}},
    prevWindow: {{.PrevWindow}},
    nextWindow: {{.NextWindow}}
};
</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="/atx/static/terminal.js"></script>
{{end}}
