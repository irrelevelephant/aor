{{define "content"}}
<div class="breadcrumb"><a href="/atx/">machines</a> / {{.Machine.Display}}</div>
<h1>
    <span class="machine-dot machine-dot-lg {{if .Machine.Online}}dot-online{{else}}dot-offline{{end}}"></span>
    {{.Machine.Display}}
</h1>
{{if .Windows}}
<div class="window-list">
    {{range .Windows}}
    <a href="/atx/m/{{$.Machine.Name}}/w/{{.Index}}" class="window-row">
        <span class="window-index">{{.Index}}</span>
        <span class="window-name">{{if .Active}}<span class="activity-dot"></span>{{end}}{{.Name}}</span>
        <span class="window-activity">{{.LastActivity}}</span>
    </a>
    {{end}}
</div>
{{else}}
<div class="empty-state">No windows yet.</div>
{{end}}
{{end}}
